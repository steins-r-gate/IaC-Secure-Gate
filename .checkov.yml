# .checkov.yml — Checkov configuration for IaC-Secure-Gate
# Phase 3: Pre-Deployment Security Gate
#
# Skip list documents intentional design decisions.
# Every suppression has a justification — this demonstrates
# deliberate risk acceptance, not negligence.

framework:
  - terraform

directory:
  - terraform/environments/dev

download-external-modules: false
evaluate-variables: true
compact: true

output:
  - cli
  - sarif

soft-fail: false

skip-check:
  # Lambda: Reserved concurrency removed due to AWS account quota limits
  # Affects: iam_remediation, s3_remediation, sg_remediation, analytics Lambda
  - CKV_AWS_115

  # Lambda: No VPC needed — functions call AWS APIs only
  # VPC + NAT Gateway would cost ~$32/month (exceeds entire project budget)
  - CKV_AWS_117

  # CloudWatch Logs: Service-level encryption is sufficient
  # KMS encryption adds API call costs; logs contain operational data, not secrets
  - CKV_AWS_158

  # S3: Access logs bucket does not log to itself (would create infinite loop)
  # The access logs bucket receives logs from CloudTrail and Config buckets
  - CKV_AWS_18

  # S3: Single-region project — cross-region replication adds cost and complexity
  # Region is eu-west-1 only, enforced by Terraform variable validation
  - CKV_AWS_144

  # SNS: Uses alias/aws/sns (AWS managed key) — topics ARE encrypted, just not with custom KMS
  # Custom KMS key adds ~$1/month per key; AWS managed key is free
  - CKV_AWS_26

  # SQS: Uses sqs_managed_sse_enabled (AES-256) instead of KMS
  # AWS recommended default for DLQs; KMS would add ~$1/month per queue
  - CKV_AWS_27

  # DynamoDB: Uses AWS managed encryption (free) instead of customer-managed KMS
  # CMK adds ~$1/month; remediation audit data is non-sensitive operational records
  - CKV_AWS_119

  # KMS: Root account principal with kms:* is the standard AWS pattern
  # Required to delegate key management to IAM policies; without this, key becomes unmanageable
  - CKV_AWS_33

  # IAM: Wildcard resources used for actions that don't support resource-level permissions
  # e.g., ec2:DescribeSecurityGroups, iam:ListPolicies — AWS requires Resource: "*"
  - CKV_AWS_355

  # IAM: Write actions use conditions (aws:ResourceTag, SourceAccount) but Checkov still flags
  # Policies are scoped via inline attachment to specific Lambda roles
  - CKV_AWS_290

  # S3: Event notifications not used — CloudTrail provides complete audit coverage
  # Also covers CloudTrail log group association (disabled in dev for cost savings)
  - CKV_AWS_252
  - CKV2_AWS_62

  # Lambda: X-Ray tracing not needed — remediation functions are event-driven with
  # DynamoDB audit trail and CloudWatch logs providing full observability
  - CKV_AWS_50

  # Lambda: Code signing not configured — functions are deployed via Terraform from
  # local source code, not from untrusted artifact registries
  - CKV_AWS_272

  # CloudWatch Logs: 30-day retention is sufficient for Lambda operational logs
  # Remediation audit data is stored in DynamoDB with 90-day TTL separately
  - CKV_AWS_338

  # Lambda: Analytics Lambda has no DLQ — it runs on a schedule for daily reports,
  # failures are non-critical and visible in CloudWatch logs
  - CKV_AWS_116

  # Lambda: Analytics Lambda env vars not KMS-encrypted — contains only table names
  # and topic ARNs, no secrets. Remediation Lambdas use KMS when configured.
  - CKV_AWS_173

  # IAM: Lambda execution role inline policies use service-level wildcards for
  # actions without resource-level support (e.g., s3:ListAllMyBuckets)
  - CKV_AWS_356
  - CKV_AWS_111
  - CKV_AWS_109

  # S3: Access logs bucket uses BucketOwnerPreferred — required by S3 log delivery service
  # BucketOwnerEnforced (which Checkov wants) blocks the logging.s3.amazonaws.com service
  - CKV2_AWS_65

  # S3: Access logs bucket uses SSE-S3 (AES256) — S3 access logging does not support
  # KMS-encrypted destination buckets; this is an AWS service limitation
  - CKV_AWS_145

  # CloudTrail: Checkov cannot evaluate count-gated CloudWatch Logs integration statically
  # CloudWatch Logs IS enabled via enable_cloudwatch_logs = true in dev/main.tf
  - CKV2_AWS_10

  # API Gateway (Slack integration): authorization = "NONE" is required for Slack webhook delivery
  # Slack POSTs to the endpoint cannot carry IAM/Cognito credentials; auth is enforced
  # in Lambda via HMAC-SHA256 signature verification against the Slack signing secret
  - CKV_AWS_59

  # API Gateway (Slack integration): access logging requires a dedicated CloudWatch Log Group
  # and incurs additional cost; CloudTrail covers API-level audit for this low-volume webhook
  - CKV_AWS_76
  - CKV2_AWS_4

  # API Gateway (Slack integration): response caching (~$14/month) is unnecessary for a
  # low-volume Slack webhook — each callback is a unique event requiring individual processing
  - CKV_AWS_120
  - CKV_AWS_225

  # API Gateway (Slack integration): X-Ray tracing adds per-request cost; CloudWatch Logs
  # provide sufficient observability for this webhook (consistent with Lambda X-Ray skip CKV_AWS_50)
  - CKV_AWS_73

  # API Gateway (Slack integration): request validation at API GW level is not applicable —
  # Slack payload format varies by interaction type; validation runs in Lambda after
  # HMAC-SHA256 signature verification
  - CKV2_AWS_53

  # API Gateway (Slack integration): Slack webhook delivery does not support mutual TLS (mTLS)
  # Client certificates cannot be provisioned for Slack's outbound HTTPS calls
  - CKV2_AWS_51

  # API Gateway (Slack integration): WAF (~$5/month base + per-request) exceeds budget for dev;
  # equivalent protection provided by Slack IP allowlisting + HMAC-SHA256 signature verification
  - CKV2_AWS_29

  # SSM Parameter Store (Slack integration): uses AWS managed key (aws/ssm) — parameters
  # ARE encrypted at rest; customer-managed CMK adds ~$1/month per key with no security benefit
  # for bot token/signing secret stored in a single-account, tightly-scoped parameter path
  - CKV_AWS_337

  # Step Functions (HITL): X-Ray tracing not enabled — state machine has CloudWatch execution
  # logging at ALL level with include_execution_data = true, providing full observability;
  # consistent with Lambda X-Ray skip (CKV_AWS_50)
  - CKV_AWS_284
