# .github/workflows/security-scan.yml
# Phase 3: IaC Security Gate — Pre-Deployment Security Scanning
#
# 5-job pipeline: validate → (parallel) checkov + opa → slack-approval → pr-comment
# Total wall-clock time: ~2 minutes (up to ~32 minutes if Slack approval needed)
#
# Implements the feedback loop: Phase 2 runtime remediation patterns
# are encoded as Phase 3 commit-time prevention policies.
# HITL: When violations are non-critical, a Slack approval can override the gate.

name: Security Scan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'lambda/**'
      - 'policies/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ================================================================
  # Job 1: Terraform Validate (~20s)
  # No credentials needed — syntax and format check only
  # ================================================================
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.5"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Create CI tfvars
        run: echo 'owner_email = "ci@iac-secure-gate.dev"' > terraform.tfvars

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Set output
        id: result
        if: always()
        run: |
          if [ "${{ steps.fmt.outcome }}" == "failure" ] || [ "${{ steps.validate.outcome }}" == "failure" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

    outputs:
      status: ${{ steps.result.outputs.status }}
      fmt-outcome: ${{ steps.fmt.outcome }}
      validate-outcome: ${{ steps.validate.outcome }}

  # ================================================================
  # Job 2: Checkov Scan (~45s)
  # Runs in parallel with OPA after validate passes
  # No AWS credentials needed — scans HCL source directly
  # ================================================================
  checkov-scan:
    name: Checkov Scan
    runs-on: ubuntu-latest
    needs: terraform-validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install -r requirements.txt

      - name: Run Checkov
        id: checkov
        run: |
          checkov \
            --config-file .checkov.yml \
            --output cli \
            --output sarif \
            --output-file-path console,results.sarif \
            2>&1 | tee checkov-output.txt
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: checkov
        continue-on-error: true

      - name: Upload Checkov results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: |
            results.sarif
            checkov-output.txt
          retention-days: 30

      - name: Parse Checkov results
        id: parse
        if: always()
        run: |
          if [ ! -f checkov-output.txt ]; then
            echo "passed=0" >> "$GITHUB_OUTPUT"
            echo "failed=0" >> "$GITHUB_OUTPUT"
            echo "skipped=0" >> "$GITHUB_OUTPUT"
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PASSED=$(grep -oP 'Passed checks: \K\d+' checkov-output.txt || true)
          FAILED=$(grep -oP 'Failed checks: \K\d+' checkov-output.txt || true)
          SKIPPED=$(grep -oP 'Skipped checks: \K\d+' checkov-output.txt || true)
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          SKIPPED=${SKIPPED:-0}
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          if [ "$FAILED" -gt 0 ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect violation details
        id: violations
        if: always()
        run: |
          if [ -f checkov-output.txt ]; then
            # Extract FAILED check lines for Slack notification
            VIOLATIONS=$(grep "FAILED" checkov-output.txt | head -20 | tr '\n' '|' || true)
            echo "details=$VIOLATIONS" >> "$GITHUB_OUTPUT"
          else
            echo "details=" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if checks failed
        if: steps.parse.outputs.status == 'failure'
        run: exit 1

    outputs:
      status: ${{ steps.parse.outputs.status }}
      passed: ${{ steps.parse.outputs.passed }}
      failed: ${{ steps.parse.outputs.failed }}
      skipped: ${{ steps.parse.outputs.skipped }}
      violations: ${{ steps.violations.outputs.details }}

  # ================================================================
  # Job 3: OPA/Conftest (~90s)
  # Runs in parallel with Checkov after validate passes
  # Requires AWS read-only credentials for terraform plan
  # ================================================================
  opa-conftest:
    name: OPA/Conftest
    runs-on: ubuntu-latest
    needs: terraform-validate
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.5"
          terraform_wrapper: false  # Critical: wrapper corrupts terraform show -json output

      - name: Install Conftest
        run: |
          CONFTEST_VERSION="0.46.0"
          wget -q "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar xzf "conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Create CI tfvars
        run: echo 'owner_email = "ci@iac-secure-gate.dev"' > terraform/environments/dev/terraform.tfvars

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform/environments/dev

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -input=false 2>&1 | tee plan-output.txt
        working-directory: terraform/environments/dev
        continue-on-error: true

      - name: Convert Plan to JSON
        if: steps.plan.outcome == 'success'
        run: terraform show -json tfplan > tfplan.json
        working-directory: terraform/environments/dev

      - name: Run Conftest
        id: conftest
        if: steps.plan.outcome == 'success'
        run: |
          conftest test \
            terraform/environments/dev/tfplan.json \
            --policy policies/opa/ \
            --no-color \
            2>&1 | tee conftest-output.txt
        continue-on-error: true

      - name: Parse Conftest results
        id: parse
        if: always()
        run: |
          if [ ! -f conftest-output.txt ]; then
            echo "failures=plan_failed" >> "$GITHUB_OUTPUT"
            echo "warnings=0" >> "$GITHUB_OUTPUT"
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FAILURES=$(grep -c "^FAIL" conftest-output.txt || true)
          WARNINGS=$(grep -c "^WARN" conftest-output.txt || true)
          FAILURES=${FAILURES:-0}
          WARNINGS=${WARNINGS:-0}
          echo "failures=$FAILURES" >> "$GITHUB_OUTPUT"
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
          if [ "$FAILURES" -gt 0 ] || [ "${{ steps.plan.outcome }}" == "failure" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect violation details
        id: violations
        if: always()
        run: |
          if [ -f conftest-output.txt ]; then
            VIOLATIONS=$(grep -E "^(FAIL|WARN)" conftest-output.txt | head -20 | tr '\n' '|' || true)
            echo "details=$VIOLATIONS" >> "$GITHUB_OUTPUT"
          else
            echo "details=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Conftest results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conftest-results
          path: |
            conftest-output.txt
            terraform/environments/dev/tfplan.json
          retention-days: 30
        continue-on-error: true

      - name: Fail if policy violations found
        if: steps.parse.outputs.status == 'failure'
        run: exit 1

    outputs:
      status: ${{ steps.parse.outputs.status }}
      failures: ${{ steps.parse.outputs.failures }}
      warnings: ${{ steps.parse.outputs.warnings }}
      violations: ${{ steps.violations.outputs.details }}

  # ================================================================
  # Job 4: Slack Approval (up to ~30 minutes)
  # Sends override request to Slack when violations are non-critical
  # Polls DynamoDB for approval status
  # ================================================================
  slack-approval:
    name: Slack Approval
    runs-on: ubuntu-latest
    needs: [checkov-scan, opa-conftest]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      (needs.opa-conftest.outputs.warnings != '0' ||
       (needs.checkov-scan.outputs.status == 'failure' && needs.checkov-scan.outputs.failed != '0'))
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-1

    steps:
      - name: Generate approval ID
        id: approval
        run: |
          APPROVAL_ID=$(uuidgen)
          echo "id=$APPROVAL_ID" >> "$GITHUB_OUTPUT"
          echo "Generated approval ID: $APPROVAL_ID"

      - name: Collect violations for Slack
        id: collect
        run: |
          VIOLATIONS=""
          CHECKOV_VIOLATIONS="${{ needs.checkov-scan.outputs.violations }}"
          OPA_VIOLATIONS="${{ needs.opa-conftest.outputs.violations }}"

          # Convert pipe-delimited back to JSON array
          VIOLATIONS_JSON="["
          FIRST=true
          IFS='|' read -ra ITEMS <<< "${CHECKOV_VIOLATIONS}${OPA_VIOLATIONS}"
          for item in "${ITEMS[@]}"; do
            if [ -n "$item" ]; then
              # Escape quotes for JSON
              ESCAPED=$(echo "$item" | sed 's/"/\\"/g' | tr -d '\n')
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                VIOLATIONS_JSON="$VIOLATIONS_JSON,"
              fi
              VIOLATIONS_JSON="$VIOLATIONS_JSON\"$ESCAPED\""
            fi
          done
          VIOLATIONS_JSON="$VIOLATIONS_JSON]"

          echo "json=$VIOLATIONS_JSON" >> "$GITHUB_OUTPUT"

      - name: Invoke CI gate notifier Lambda
        id: notify
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "approval_id": "${{ steps.approval.outputs.id }}",
            "pr_number": ${{ github.event.pull_request.number }},
            "pr_url": "${{ github.event.pull_request.html_url }}",
            "violations": ${{ steps.collect.outputs.json }}
          }
          EOF
          )

          aws lambda invoke \
            --function-name "iam-secure-gate-dev-ci-gate-notifier" \
            --payload "$(echo "$PAYLOAD" | base64 -w0)" \
            --cli-binary-format raw-in-base64-out \
            /tmp/lambda-response.json

          cat /tmp/lambda-response.json
          echo "Slack notification sent"

      - name: Poll DynamoDB for approval
        id: poll
        run: |
          APPROVAL_ID="${{ steps.approval.outputs.id }}"
          TABLE_NAME="iam-secure-gate-dev-remediation-history"
          MAX_ATTEMPTS=60  # 30 minutes at 30s intervals
          ATTEMPT=0
          STATUS="PENDING"

          echo "Polling for approval: $APPROVAL_ID"
          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            ATTEMPT=$((ATTEMPT + 1))

            # Query DynamoDB by approval_id GSI
            RESULT=$(aws dynamodb query \
              --table-name "$TABLE_NAME" \
              --index-name "approval-id-index" \
              --key-condition-expression "approval_id = :aid" \
              --expression-attribute-values "{\":aid\":{\"S\":\"$APPROVAL_ID\"}}" \
              --query "Items[0].status.S" \
              --output text 2>/dev/null || echo "PENDING")

            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: status=$RESULT"

            if [ "$RESULT" = "APPROVED" ]; then
              echo "override=true" >> "$GITHUB_OUTPUT"
              echo "status=APPROVED" >> "$GITHUB_OUTPUT"
              echo "Approval granted!"
              exit 0
            elif [ "$RESULT" = "REJECTED" ]; then
              echo "override=false" >> "$GITHUB_OUTPUT"
              echo "status=REJECTED" >> "$GITHUB_OUTPUT"
              echo "Approval rejected."
              exit 0
            fi

            sleep 30
          done

          echo "override=false" >> "$GITHUB_OUTPUT"
          echo "status=TIMEOUT" >> "$GITHUB_OUTPUT"
          echo "Approval timed out after 30 minutes."

    outputs:
      override: ${{ steps.poll.outputs.override }}
      status: ${{ steps.poll.outputs.status }}

  # ================================================================
  # Job 5: PR Comment (~10s)
  # Aggregates results from all checks and posts summary to PR
  # ================================================================
  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    needs: [terraform-validate, checkov-scan, opa-conftest, slack-approval]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const validate = '${{ needs.terraform-validate.outputs.status }}';
            const checkov = '${{ needs.checkov-scan.outputs.status }}';
            const opa = '${{ needs.opa-conftest.outputs.status }}';

            const checkovPassed = '${{ needs.checkov-scan.outputs.passed }}';
            const checkovFailed = '${{ needs.checkov-scan.outputs.failed }}';
            const checkovSkipped = '${{ needs.checkov-scan.outputs.skipped }}';

            const opaFailures = '${{ needs.opa-conftest.outputs.failures }}';
            const opaWarnings = '${{ needs.opa-conftest.outputs.warnings }}';

            const fmtOutcome = '${{ needs.terraform-validate.outputs.fmt-outcome }}';
            const validateOutcome = '${{ needs.terraform-validate.outputs.validate-outcome }}';

            // HITL override status
            const slackOverride = '${{ needs.slack-approval.outputs.override }}';
            const slackStatus = '${{ needs.slack-approval.outputs.status }}';
            const hitlRequested = slackStatus !== '';

            const icon = (status) => status === 'success' ? ':white_check_mark:' : ':x:';
            const scansPassed = validate === 'success' && checkov === 'success' && opa === 'success';
            const overrideApproved = slackOverride === 'true';
            const allPassed = scansPassed || overrideApproved;

            // Build HITL status line
            let hitlLine = '';
            if (hitlRequested) {
              const hitlIcon = overrideApproved ? ':white_check_mark:' : ':x:';
              const hitlDetail = {
                'APPROVED': 'Override approved via Slack',
                'REJECTED': 'Override rejected via Slack',
                'TIMEOUT': 'Override timed out (30 min)',
              }[slackStatus] || 'Unknown';
              hitlLine = `| **Slack HITL Override** | ${hitlIcon} | ${hitlDetail} |`;
            }

            const body = [
              `## ${allPassed ? ':white_check_mark:' : ':x:'} Security Scan Results`,
              '',
              '| Check | Status | Details |',
              '|-------|--------|---------|',
              `| **Terraform Format** | ${icon(fmtOutcome)} | ${fmtOutcome === 'success' ? 'Properly formatted' : 'Format issues found'} |`,
              `| **Terraform Validate** | ${icon(validateOutcome)} | ${validateOutcome === 'success' ? 'Configuration valid' : 'Validation errors'} |`,
              `| **Checkov** | ${icon(checkov)} | ${checkovPassed} passed, ${checkovFailed} failed, ${checkovSkipped} skipped |`,
              `| **OPA/Conftest** | ${icon(opa)} | ${opaFailures} deny violations, ${opaWarnings} warnings |`,
              hitlLine,
              '',
              '### Gate Decision',
              allPassed
                ? (overrideApproved
                  ? ':white_check_mark: **Security violations overridden via Slack HITL approval.** This PR may be merged.'
                  : ':white_check_mark: **All security checks passed.** This PR is safe to merge.')
                : ':x: **Security violations detected.** Fix the issues above before merging.',
              '',
              '---',
              '<sub>Phase 3: IaC Security Gate + HITL | Checkov (1000+ checks) + OPA/Rego (7 custom policies) + Slack approval</sub>',
            ].filter(line => line !== '').join('\n');

            // Find existing bot comment to update (avoids spam on re-pushes)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Security Scan Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
